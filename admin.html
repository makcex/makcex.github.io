<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin</title>
    <style>
       body {
    background: #f0f2f5; /* lembut dan profesional */
    font-family: 'Arial', sans-serif;
    color: #333;
}
.card {
    background: rgba(255,255,255,0.95);
}
button {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #0056b3;
}

input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 100%;
    margin-top: 10px;
    box-sizing: border-box;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    text-align: left;
}
tr:nth-child(even) {
    background: #f9f9f9;
}
th {
    background: lch(24.58% 22.44 270.53);
    color: white;
}
@media (max-width: 768px) {
    .box {
        grid-template-columns: 1fr;
    }
}


        #laporan {
    background: rgba(255, 255, 255, 0.85); /* biar teks terlihat */
    padding: 15px;
    top: 1rem;
    bottom: 0;
    border-radius: 8px;
    max-height: 400px;
    overflow-y: auto;
    color: black; /* teks jelas */
    font-family: Arial, sans-serif;
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
}

#user-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.8rem;
    padding: 5px;
}

.user-card {
    background: rgba(255,255,255,0.95);
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    font-family: Arial, sans-serif;
    color: #333;
}

.user-card h4 { margin: 0 0 5px 0; color:#007bff; }
.user-card p { margin:2px 0; font-size:14px; }

    </style>
</head>
<body>
    <h1> Admin Dashboard</h1>

    <div class="box">
    <div>
        <h3>Tambah Produk Baru</h3>
        <input type="file" id="img" placeholder="pilih gambar"><hr>
        <input type="text" id="nama" placeholder="nama produk">
        <input type="number" id="harga" placeholder="harga produk">
        <input type="text" id="jenis" placeholder="type produk">
        <input type="number" id="stok" placeholder="jumlah produk">
        <button onclick="tambahProduk()">Simpan</button>
    </div>

    <!-- Kasir / Penjualan -->
  <div>
    <h3>Penjualan Toko (Kasir)</h3>
    <input type="text" id="produkKasir" list="listProduk" placeholder="Ketik nama produk">
    <datalist id="listProduk"></datalist>
    <input type="number" id="jumlahKasir" placeholder="Jumlah">
    <button onclick="tambahKasir()">Tambah</button>

    <hr>
    <h4>Barang / Jasa Khusus (tidak masuk toko online)</h4>
    <input type="text" id="produkManual" placeholder="Nama barang/jasa">
    <input type="number" id="hargaManual" placeholder="Harga">
    <input type="number" id="jumlahManual" placeholder="Jumlah">
    <input type="text" id="keteranganManual" placeholder="Keterangan (cash / ngutang / dp)">
    <button onclick="tambahManual()">Tambah Manual</button>

    <div id="listKasir"></div>
    <h4 id="totalKasir">Total Cash: Rp 0 | Total Utang: Rp 0</h4>

    <button onclick="bayarKasir()" style="background: goldenrod; min-width: 250px;margin-bottom: 1rem;">Bayar</button>
  </div>
</div>
<button onclick="bayarKasirUtang()" style="background: red;">Simpan Utang</button>
<button onclick="bayarUtangServer()" style="background: red;">Bayar Utang</button>
<br>
<div id="laporan">
  <button onclick="loadTransaksi()">Lihat Transaksi</button>
  <table border="1">
    <thead>
      <tr>
        <th>tanggal</th>
        <th>nama</th>
        <th>items</th>
        <th>keterangan</th>
        <th>total</th>
      </tr>
    </thead>
    <tbody id="laporan1"></tbody>
  </table>
</div>

<div>
  <h3>Pengeluaran</h3>
  <input type="text" id="ketPengeluaran" placeholder="Keterangan">
  <input type="number" id="jumlahPengeluaran" placeholder="Jumlah (Rp)">
  <button onclick="tambahPengeluaran()" style="background: brown;">Tambah Pengeluaran</button>

  <h4>Histori Pengeluaran</h4>
  <table border="1" id="listPengeluaran">
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Keterangan</th>
        <th>Jumlah</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<button onclick="reset()" style="background: #333;">Reset Transaksi</button><br>
<h3>Daftar User</h3>
<div id="user-list" style="max-height:400px; overflow-y:auto;"></div>
    <script>

function loadTransaksi() {
  fetch('/admin-data?k=abc')
  .then(res => {
    if (!res.ok) throw new Error("Gagal ambil data admin");
    return res.json();
  })
  .then(data => {
    const container = document.getElementById('laporan1')
    container.innerHTML = ''

    let totalOmzet = 0

    data.forEach(tr => {
      totalOmzet += tr.total

      const tanggal = new Date(tr.tanggal).toLocaleString()

      const itemsText = tr.cart.map(i => `${i.nama} x${i.jumlah}`).join(', ')
      const keteranganText = tr.cart.map(i => i.keterangan || '-').join(', ')

      container.innerHTML += `
        <tr>
          <td>${tanggal}</td>
          <td>${tr.user.nama}</td>
          <td>${itemsText}</td>
          <td>${keteranganText}</td>
          <td>Rp ${tr.total.toLocaleString()}</td>
        </tr>
      `
    })

    // Tampilkan total omzet di bawah tabel
    container.innerHTML += `
      <tr>
        <td colspan="4" style="text-align:right"><b>Total Omzet:</b></td>
        <td><b>Rp ${totalOmzet.toLocaleString()}</b></td>
      </tr>
    `
  })
  .catch(err => {
    console.error(err)
    alert("Gagal ambil data transaksi")
  })
}

    function tambahProduk() {
    const fileInput = document.getElementById('img')

    if (fileInput.files.length === 0) {
        alert('Pilih gambar terlebih dahulu!')
        return
    }

    // 1️⃣ Upload gambar
    const formData = new FormData()
    formData.append('img', fileInput.files[0])

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(upload => {
        // 2️⃣ Simpan data produk
        const produk = {
            gbr: upload.fileName,
            nama: document.getElementById('nama').value,
            harga: Number(document.getElementById('harga').value),
            jenis: document.getElementById('jenis').value,
            stok: Number(document.getElementById('stok').value)
        }

        return fetch('/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(produk)
        })
    })
    .then(res => res.json())
    .then(() => {
        alert('Barang berhasil ditambahkan ✅')

        document.querySelectorAll('input').forEach(i => i.value = '')
    })
    .catch(err => {
        console.error(err)
        alert('Terjadi error 😢')
    })
}


// --- Produk online ---
let semuaProduk = [];
fetch("/products").then(r=>r.json()).then(d=>{
    semuaProduk = d;
    const datalist = document.getElementById("listProduk");
    datalist.innerHTML = "";
    d.forEach(p=>{ datalist.innerHTML += `<option value="${p.nama}">Stok: ${p.stok}</option>` });
});

// --- Kasir Cart ---
let kasirCart = [];

// Tambah barang ke kasir
function tambahKasir(){
    const namaProduk = document.getElementById("produkKasir").value.trim();
    const jumlah = Number(document.getElementById("jumlahKasir").value);

    if(!namaProduk || jumlah <= 0){
        alert("Nama produk dan jumlah harus diisi");
        return;
    }

    let produk = semuaProduk.find(p =>
        p.nama.toLowerCase() === namaProduk.toLowerCase()
    );

    let isManual = false;

    // Jika tidak ada di toko online → buat manual
    if(!produk){
        const hargaManual = Number(prompt(`Produk "${namaProduk}" tidak ada di toko.\nMasukkan harga:`));
        if(!hargaManual || hargaManual <= 0){
            alert("Harga tidak valid");
            return;
        }

        produk = {
            id: "manual_" + Date.now(),
            nama: namaProduk,
            harga: hargaManual,
            stok: Infinity
        };

        isManual = true;
    }

    // Jika produk online cek stok
    if(!isManual && produk.stok < jumlah){
        alert("Stok tidak cukup");
        return;
    }

    kasirCart.push({
        id: produk.id,
        nama: produk.nama,
        harga: produk.harga,
        jumlah: jumlah,
        manual: isManual
    });

    if(!isManual){
        produk.stok -= jumlah;
    }

    document.getElementById("produkKasir").value = "";
    document.getElementById("jumlahKasir").value = "";

    renderKasir();
}

// Tambah manual
function tambahManual(){
    const nama = document.getElementById("produkManual").value.trim();
    const harga = Number(document.getElementById("hargaManual").value);
    const jumlah = Number(document.getElementById("jumlahManual").value);
    const keterangan = document.getElementById("keteranganManual").value.trim() || "cash";

    if(!nama || harga<=0 || jumlah<=0){ alert("Nama, harga, jumlah harus valid"); return; }

    kasirCart.push({ id:'manual_'+Date.now(), nama, harga, jumlah, manual:true, keterangan });

    document.getElementById("produkManual").value="";
    document.getElementById("hargaManual").value="";
    document.getElementById("jumlahManual").value="";
    document.getElementById("keteranganManual").value="";

    renderKasir();
}

// Render list kasir
function renderKasir(){
    const list = document.getElementById("listKasir");
    const totalEl = document.getElementById("totalKasir");

    list.innerHTML = "";

    let total = 0;

    kasirCart.forEach((i, idx) => {
        total += i.harga * i.jumlah;

        list.innerHTML += `
            <p>
                ${i.nama} - Rp ${i.harga.toLocaleString()} x ${i.jumlah}
                <button onclick="hapusKasir(${idx})" 
                style="background:red;width:60px;">X</button>
            </p>
        `;
    });

    totalEl.innerText = `Total: Rp ${total.toLocaleString()}`;
}

// Hapus item kasir
function hapusKasir(idx){ kasirCart.splice(idx,1); renderKasir(); }

// Bayar kasir (offline + stok online terupdate)
function bayarKasir(){
    if(kasirCart.length===0){ alert("Belum ada barang"); return; }

    const komfirmasi = confirm("yakin ingin menyimpan sebagai CASH | BOTONG TUN!")
    if(!komfirmasi) return

    fetch("/jual",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ items: kasirCart })
    }).then(r=>r.json()).then(d=>{
        if(!d.success) return alert(d.message);
        alert("Transaksi berhasil. Total: Rp "+d.total.toLocaleString());
        kasirCart=[];
        renderKasir();
        loadTransaksi();
        fetch("/products").then(r=>r.json()).then(d=>semuaProduk=d);
    });
}

// --- UTANG ---

// Simpan utang
function bayarKasirUtang(){
    if(kasirCart.length === 0){
        alert("Belum ada barang");
        return;
    }

    const komfirmasi = confirm("yakin ingin menyimpan sebagai HUTANG | BOTONG TUN!")
    if(!komfirmasi) return

    const nama = prompt("Nama pembeli utang:");
    if(!nama) return;

    fetch('/utang', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            nama,
            items: kasirCart
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(!data.success){
            alert("Gagal simpan utang: "+data.message);
            return;
        }

        alert("Utang berhasil dicatat. Total: Rp " + data.utang.total.toLocaleString());

        kasirCart = [];
        renderKasir();
        loadTransaksi();
    });
}

// Bayar utang yang sudah tercatat
async function bayarUtangServer(){
    try {
        const res = await fetch('/get-utang');
        const data = await res.json();
        if(data.length === 0){ alert("Tidak ada utang"); return; }

        let msg = "Utang:\n";
        data.forEach((u,i)=> msg += `${i+1}. ${u.nama} - Rp ${u.total.toLocaleString()}\n`);
        const pilih = Number(prompt(msg+"\nPilih nomor utang yang dibayar:"));
        if(!pilih || pilih < 1 || pilih > data.length) return;

        const utang = data[pilih-1];
        const bayar = Number(prompt(`Total utang: Rp ${utang.total.toLocaleString()}\nMasukkan jumlah bayar:`));
        if(!bayar || bayar <= 0) return;

        const resBayar = await fetch('/bayar-utang',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({id: utang.id, jumlahBayar: bayar})
        });
        const resData = await resBayar.json();
        if(!resData.success){ alert("Gagal bayar utang: "+resData.message); return; }

        alert("Berhasil bayar. Sisa utang: Rp "+resData.sisa.toLocaleString());
        loadTransaksi(); // update UI
    } catch(err) {
        console.error(err);
        alert("Gagal bayar utang");
    }
}

// --- Load transaksi & gabungkan utang ---
async function loadTransaksi() {
    try{
        // ambil data checkout
        const res1 = await fetch('/admin-data?k=abc');
        const checkout = await res1.json();

        // ambil data pengeluaran
        const res2 = await fetch('/pengeluaran');
        const pengeluaran = await res2.json();

        // ambil data utang (tetap dari server utang)
        const res3 = await fetch('/get-utang');
        const utang = await res3.json();

        const container = document.getElementById('laporan1');
        container.innerHTML = '';

        let totalOmzetRaw = 0;
        let totalUtang = 0;

        // transaksi checkout
        checkout.forEach(tr=>{
            if(tr.tipe==='offline' || (tr.tipe==='online' && tr.status==='selesai')){
                totalOmzetRaw += tr.total;
            }
            const itemsText = tr.cart.map(i=>`${i.nama} x${i.jumlah}`).join(', ');
            const keteranganText = tr.cart.map(i=>i.keterangan||'-').join(', ');

            container.innerHTML += `
            <tr>
                <td>${new Date(tr.tanggal).toLocaleString()}</td>
                <td>${tr.user.nama}</td>
                <td>${itemsText}</td>
                <td>${keteranganText}</td>
                <td>Rp ${tr.total.toLocaleString()}</td>
            </tr>
            `;
        });

        // hitung total utang
        utang.forEach(u=>{
            totalUtang += u.total;
            const itemsText = u.cart.map(i=>`${i.nama} x${i.jumlah}`).join(', ');
            const keteranganText = u.cart.map(i=>i.keterangan||'-').join(', ');

            container.innerHTML += `
            <tr>
                <td>${new Date(u.tanggal).toLocaleString()}</td>
                <td>${u.nama}</td>
                <td>${itemsText}</td>
                <td>${keteranganText}</td>
                <td>Rp ${u.total.toLocaleString()}</td>
            </tr>
            `;
        });

        // total pengeluaran
        const totalPengeluaran = pengeluaran.reduce((sum,p)=>sum+p.jumlah,0);

        // tampilkan total
        container.innerHTML += `
        <tr>
            <td colspan="4" style="text-align:right"><b>Total Omzet Bersih:</b></td>
            <td><b>Rp ${(totalOmzetRaw - totalPengeluaran).toLocaleString()}</b></td>
        </tr>
        <tr>
            <td colspan="4" style="text-align:right"><b>Total Utang:</b></td>
            <td><b>Rp ${totalUtang.toLocaleString()}</b></td>
        </tr>
        `;

        // render histori pengeluaran terpisah
        const pengeluaranContainer = document.getElementById('listPengeluaran');
        pengeluaranContainer.innerHTML = '';
        pengeluaran.forEach(p=>{
            pengeluaranContainer.innerHTML += `
            <tr>
                <td>${new Date(p.tanggal).toLocaleString()}</td>
                <td>${p.keterangan}</td>
                <td>Rp ${p.jumlah.toLocaleString()}</td>
            </tr>
            `;
        });
        renderUserList(checkout);

    } catch(err){
        console.error(err);
        alert('Gagal load transaksi / pengeluaran / utang');
    }
}

async function tambahPengeluaran(){
  const keterangan = document.getElementById('ketPengeluaran').value.trim();
  const jumlah = Number(document.getElementById('jumlahPengeluaran').value);
  if(!keterangan || jumlah<=0){ alert("Isi keterangan dan jumlah valid"); return; }

  const res = await fetch('/pengeluaran',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ keterangan, jumlah })
  });
  const data = await res.json();
  if(!data.success){ alert(data.message); return; }

  alert("Pengeluaran tercatat ✅");
  document.getElementById('ketPengeluaran').value='';
  document.getElementById('jumlahPengeluaran').value='';

  loadTransaksi(); // update total omzet bersih
}

let historiVisible = false;
function toggleHistoriPengeluaran(){
  historiVisible = !historiVisible;
  document.getElementById('historiPengeluaran').style.display = historiVisible ? 'block' : 'none';
  if(historiVisible) loadPengeluaran();
}

async function loadPengeluaran(){
  const res = await fetch('/pengeluaran');
  const data = await res.json();
  const container = document.getElementById('pengeluaranList');
  container.innerHTML='';
  data.forEach(p=>{
    container.innerHTML += `<tr>
      <td>${new Date(p.tanggal).toLocaleString()}</td>
      <td>${p.keterangan}</td>
      <td>Rp ${p.jumlah.toLocaleString()}</td>
    </tr>`;
  });
}
async function updateStatus(id, status){
    if(!confirm("Yakin ubah status?")) return

    await fetch('/update-status',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ id, status })
    })

    loadTransaksi()
}
async function reset() {
    const konfirmasi = confirm("Yakin ingin menghapus SEMUA transaksi, utang, dan pengeluaran?");
    if (!konfirmasi) return;

    try {

        // 1️⃣ Hapus transaksi & utang
        const resTransaksi = await fetch('/reset-transaksi', {
            method: 'DELETE'
        });
        const dataTransaksi = await resTransaksi.json();

        if (!dataTransaksi.success) {
            alert("Gagal reset transaksi: " + dataTransaksi.message);
            return;
        }

        // 2️⃣ Hapus semua pengeluaran
        const resPengeluaran = await fetch('/reset-pengeluaran', {
            method: 'DELETE'
        });
        const dataPengeluaran = await resPengeluaran.json();

        if (!dataPengeluaran.success) {
            alert("Transaksi terhapus, tapi gagal hapus pengeluaran");
            return;
        }

        alert("Semua data berhasil direset ✅");

        // 3️⃣ Kosongkan tampilan langsung
        document.getElementById("laporan1").innerHTML = "";
        document.getElementById("listPengeluaran").querySelector("tbody").innerHTML = "";
        document.getElementById("user-list").innerHTML = "";

        // 4️⃣ Reload supaya total jadi 0
        loadTransaksi();

    } catch (err) {
        console.error(err);
        alert("Terjadi kesalahan saat reset");
    }
}
function renderUserList(checkoutData){
    const container = document.getElementById('user-list');
    container.innerHTML = '';

    const onlinePending = checkoutData.filter(tr =>
        tr.tipe === 'online' && tr.status === 'pending'
    );

    onlinePending.forEach(tr => {
        const div = document.createElement('div');
        div.className = 'user-card';

        div.innerHTML = `
            <h4>${tr.user?.nama || '-'}</h4>
            <p>HP: ${
        tr.user?.hp 
        ? `<a href="https://wa.me/${tr.user.hp.replace(/\D/g,'')}" target="_blank">${tr.user.hp}</a>` 
        : '-'}</p>
            <p><b>Alamat: ${tr.user?.alamat || '-'}</b></p>
            <p>Total: Rp ${tr.total.toLocaleString()}</p>
            <p>Status: pending</p>

            <button onclick="updateStatus(${tr.id}, 'selesai')">
                Selesai
            </button>

            <button onclick="updateStatus(${tr.id}, 'batal')" 
                style="background:red">
                Batal
            </button>
        `;

        container.appendChild(div);
    });
}
window.onload=()=>{ loadTransaksi(); }
setInterval(()=>{ loadTransaksi(); },10000);


</script>
</body>
</html>
